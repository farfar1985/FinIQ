# =============================================================================
# finiq_financial_base — Normalized Base Fact Table (HIGH RISK)
# 740M rows. ID-only columns. Must join dimensions manually.
# =============================================================================

table_name: finiq_financial_base
object_type: table
schema: finsight_core_model
risk_level: HIGH
row_count: 739574399

discovery:
  summary: >
    The normalized base fact table with ID-only columns. 740M rows.
    This is the pre-consolidation source (before unit hierarchy rollup).
    Contains Economic_Cell_ID and Unit_Customer_ID which the denormalized
    table also has, but at the base (non-rolled-up) level. Use only when
    you need base-level granularity before consolidation.
  answers_questions:
    - "Base-level financial data before unit consolidation rollup"
    - "Analysis at economic cell level with original (non-rolled-up) unit"
    - "Customer-level analysis at base unit level"
  do_not_use_for:
    - "Standard P&L (use views)"
    - "Any question that doesn't specifically need pre-consolidation data"

sql_context:
  columns:
    - { name: Date_ID, type: INT, filter_required: true }
    - { name: Unit_ID, type: INT, filter_required: true }
    - { name: RL_ID, type: INT }
    - { name: Composite_Item_ID, type: STRING, description: "Product composite ID (string, not int)" }
    - { name: Economic_Cell_ID, type: INT }
    - { name: Unit_Customer_ID, type: STRING }
    - { name: USD_Value, type: FLOAT }
  notes: "ID-only columns. Must join to dimension tables for names. 7.8x smaller than finiq_financial because no consolidation rollup."

