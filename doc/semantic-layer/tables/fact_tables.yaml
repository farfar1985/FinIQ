# =============================================================================
# finiq_financial — Denormalized Fact Table (EXTREME RISK)
# 5.7 BILLION rows. NEVER query without filters. Prefer views instead.
# =============================================================================

table_name: finiq_financial
object_type: table
schema: finsight_core_model
risk_level: EXTREME
row_count: 5758891376

discovery:
  summary: >
    The fully denormalized financial fact table. Contains every financial record
    with all dimension attributes pre-joined (38 columns). 5.7 billion rows due to
    unit consolidation hierarchy (each record appears once per parent unit).
    PREFER VIEWS OVER THIS TABLE. Only use this directly when you need columns
    not available in the views (e.g., customer data, brand, segment, specific
    dimension attributes not in view output).
  answers_questions:
    - "Questions requiring columns not in the P&L or NCFO views"
    - "Cross-dimensional analysis combining unit + brand + customer"
    - "Balance Sheet or Sources & Uses analysis (not covered by views)"
  do_not_use_for:
    - "Standard P&L analysis (use finiq_vw_pl_unit or finiq_vw_pl_brand_product)"
    - "NCFO analysis (use finiq_vw_ncfo_unit)"
    - "Any question that can be answered by the views"

sql_context:
  columns:
    # --- Identifiers & Filters ---
    - { name: Date_ID, type: INT, description: "Fiscal period YYYYPP", filter_required: true }
    - { name: Year, type: INT, description: "Fiscal year" }
    - { name: Period, type: STRING, description: "Fiscal period (string)" }
    - { name: Quarter, type: STRING, description: "Fiscal quarter" }
    - { name: Unit_ID, type: INT, description: "Org unit ID", filter_required: true }
    - { name: Reporting_Line_ID, type: INT, description: "Reporting line ID" }
    - { name: Brand_ID, type: INT, description: "Brand ID" }
    # --- Unit Dimensions ---
    - { name: Parent_Unit, type: STRING, description: "Parent org unit name" }
    - { name: Unit, type: STRING, description: "Unit name (UPPERCASE)" }
    - { name: Unit_Level, type: INT, description: "Hierarchy level (0=top)" }
    # --- Reporting Line Dimensions ---
    - { name: Parent_Reporting_Line, type: ARRAY, description: "Array of parent RL names (hierarchy path)" }
    - { name: Reporting_Line_KPI, type: STRING, description: "RL name" }
    - { name: Statement, type: ARRAY, description: "Array of financial statement classifications (e.g., P&L, BS)" }
    # --- Product Dimensions ---
    - { name: EC_Group, type: STRING, description: "EC Group name" }
    - { name: Brand, type: STRING, description: "Brand name" }
    - { name: Segment, type: STRING, description: "Product segment" }
    - { name: Market_Segment, type: STRING }
    - { name: Technology, type: STRING }
    - { name: Supply_Tech, type: STRING }
    - { name: Product_Consolidation, type: STRING }
    - { name: Product_Category, type: STRING }
    - { name: Business_Segment, type: STRING }
    - { name: Pack_Format, type: STRING }
    - { name: Economic_Cell, type: STRING }
    - { name: Archetype, type: STRING, description: "Economic cell archetype: GROWTH ENGINE, SEED, FUEL FOR GROWTH, HARVEST, OTHER" }
    # --- Customer Dimensions ---
    - { name: Customer_ID, type: STRING }
    - { name: Country, type: STRING }
    - { name: Customer_Name, type: STRING }
    - { name: SCM_ID, type: STRING, description: "Supply chain management ID" }
    - { name: Customer_Level_1, type: STRING }
    - { name: Customer_Level_2, type: STRING }
    - { name: Customer_Level_3, type: STRING }
    - { name: Customer_Channel, type: STRING }
    - { name: Customer_Format, type: STRING }
    - { name: Customer_Subformat, type: STRING }
    # --- Values ---
    - { name: Currency, type: STRING, description: "Local currency code" }
    - { name: Sign_Conversion, type: INT, description: "+1 or -1, indicates natural sign of the RL" }
    - { name: USD_Value, type: FLOAT, description: "Financial value in USD" }
    - { name: Local_Value, type: FLOAT, description: "Financial value in local currency" }

  notes: >
    Parent_Reporting_Line and Statement are ARRAY columns. To filter by statement,
    use array_contains(Statement, 'P&L'). To filter by parent RL, use
    array_contains(Parent_Reporting_Line, 'NET SALES TOTAL').

  safe_query_patterns:
    - description: "Must always filter by Unit_ID + Date_ID at minimum, and aggregate"
      sql: |
        SELECT Unit, Reporting_Line_KPI, Brand, SUM(USD_Value) as Total_USD
        FROM finiq_financial
        WHERE Unit_ID = 13000
          AND Date_ID = 202506
          AND array_contains(Statement, 'P&L')
        GROUP BY Unit, Reporting_Line_KPI, Brand
        ORDER BY Total_USD DESC
        LIMIT 100

  dangerous_patterns:
    - pattern: "Any query without WHERE Unit_ID and Date_ID"
      why: "5.7 billion rows. Will timeout."
    - pattern: "SELECT * FROM finiq_financial"
      why: "38 columns x 5.7B rows. Catastrophic."
    - pattern: "WHERE Statement = 'P&L' (equality on ARRAY column)"
      why: "Statement is ARRAY type. Use array_contains(Statement, 'P&L') instead."

