# =============================================================================
# finiq_financial_replan — Budget vs Actual (MEDIUM RISK)
# 2.7M rows. Budget comparison data.
# =============================================================================

table_name: finiq_financial_replan
object_type: table
schema: finsight_core_model
risk_level: MEDIUM
row_count: 2740193

discovery:
  summary: >
    Budget vs actual comparison data. Contains both actual financial values
    and replan (budget/forecast) values. FY2025 has actuals only. FY2026 Q1
    has both actuals and replan. FY2026 Q2-Q4 has replan (budget) only.
    Use when anyone asks about budget variance, forecast vs actual, or plan comparison.
  answers_questions:
    - "How does actual performance compare to budget?"
    - "What is the budget variance for this quarter?"
    - "Show replan vs actual for a specific unit"
    - "Are we on track against the forecast?"
    - "Budget to actual comparison by reporting line"

sql_context:
  columns:
    - { name: Submission_Type_ID, type: INT, values: [1, 2] }
    - { name: Date_ID, type: INT, filter_required: true, range: "202501-202613" }
    - { name: Year, type: INT, description: "Fiscal year" }
    - { name: Quarter, type: STRING, description: "Fiscal quarter" }
    - { name: Parent_Unit, type: STRING, description: "Parent unit name" }
    - { name: Unit, type: STRING, description: "Unit name" }
    - { name: Unit_Level, type: INT, description: "Hierarchy level" }
    - { name: Parent_Reporting_Line, type: ARRAY, description: "Array of parent RL names" }
    - { name: Reporting_Line_KPI, type: STRING, description: "RL name" }
    - { name: Statement, type: ARRAY, description: "Array of financial statement classifications" }
    - { name: Currency, type: STRING }
    - { name: Sign_Conversion, type: INT }
    - { name: Unit_ID, type: INT, filter_required: true }
    - { name: Reporting_Line_ID, type: INT }
    - { name: Actual_USD_Value, type: FLOAT, description: "Actual financial value (null for future periods)" }
    - { name: Actual_Local_Value, type: FLOAT, description: "Actual in local currency" }
    - { name: Replan_USD_Value, type: FLOAT, description: "Budget/replan value" }
    - { name: Replan_Local_Value, type: FLOAT, description: "Replan in local currency" }

  notes: >
    Parent_Reporting_Line and Statement are ARRAY columns (same as finiq_financial).
    Use array_contains() for filtering.

  data_availability:
    - period: "FY2025 (202501-202513)"
      actuals: true
      replan: false
    - period: "FY2026 Q1 (202601-202603)"
      actuals: true
      replan: true
    - period: "FY2026 Q2-Q4 (202604-202613)"
      actuals: false
      replan: true

  safe_query_patterns:
    - description: "Budget variance for a unit and period"
      sql: |
        SELECT Unit, Reporting_Line_KPI, Actual_USD_Value, Replan_USD_Value,
               (Actual_USD_Value - Replan_USD_Value) AS Variance
        FROM finiq_financial_replan
        WHERE Unit_ID = 13000
          AND Date_ID = 202506

