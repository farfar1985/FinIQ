# =============================================================================
# finiq_financial_cons — Consolidated Fact Table (EXTREME RISK)
# 5.8 BILLION rows. Source table for the P&L and NCFO views.
# =============================================================================

table_name: finiq_financial_cons
object_type: table
schema: finsight_core_model
risk_level: EXTREME
row_count: 5781441613

discovery:
  summary: >
    Consolidated financial fact table. This is the source for finiq_vw_pl_unit
    and finiq_vw_ncfo_unit views. 5.8 billion rows. Do not query directly
    unless the views are insufficient for your needs.
  do_not_use_for:
    - "Almost everything — use the views instead"

sql_context:
  notes: "Source for P&L and NCFO views. Same structure as finiq_financial. Do not query directly."

