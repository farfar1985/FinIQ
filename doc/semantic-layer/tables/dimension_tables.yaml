# =============================================================================
# finiq_dim_rl — Reporting Lines Hierarchy
# =============================================================================

table_name: finiq_dim_rl
object_type: table
schema: finsight_core_model
risk_level: SAFE
row_count: 725

discovery:
  summary: >
    Reporting lines hierarchy. 725 lines across 7 financial statements
    (P&L, BS, BSR, EP, S&U, Overheads, Others). Maps RL IDs to names,
    parent relationships, and financial statement classification.
    Use when you need to look up what a reporting line means, find its ID,
    or navigate the RL hierarchy.
  answers_questions:
    - "What reporting lines are in the P&L?"
    - "What is the RL_ID for Net Sales?"
    - "Show the hierarchy under Controllable Profit"
    - "What statement does this reporting line belong to?"
    - "List all KPI reporting lines"

sql_context:
  columns:
    - { name: Child_RL_ID, type: INT, description: "Reporting line ID (join key for fact tables)" }
    - { name: Child_RL, type: STRING, description: "Reporting line name" }
    - { name: Parent_RL_IDs, type: ARRAY, description: "Array of parent RL IDs (hierarchy)" }
    - { name: Statement, type: STRING, description: "Financial statement: P&L, BS, BSR, EP, S&U, Overheads, Others" }
    - { name: Sign_Conversion, type: INT, description: "+1 or -1, indicates natural sign direction" }

  financial_statements:
    - "P&L — Profit & Loss"
    - "BS — Balance Sheet"
    - "BSR — Balance Sheet Reclassification"
    - "EP — Earnings/Performance"
    - "S&U — Sources & Uses"
    - "Overheads — Overhead cost allocation"
    - "Others — Miscellaneous"

  hierarchy_depth:
    -1: "62 lines — no parents (orphans/top-level)"
    1: "527 lines — single parent (leaf)"
    2: "117 lines — two-level (intermediate)"
    3: "19 lines — three-level (high aggregation)"

