# =============================================================================
# finiq_composite_item — Product Master
# =============================================================================

table_name: finiq_composite_item
object_type: table
schema: finsight_core_model
risk_level: SAFE
row_count: 9478

discovery:
  summary: >
    Product master dimension. 9,478 composite items with attributes including
    EC Group, Brand, Segment, Technology, Product Category, Business Segment,
    and Product Consolidation. Use for product lookups and product hierarchy navigation.
  answers_questions:
    - "What products are in the BAR EC group?"
    - "List all brands in the Chocolate segment"
    - "What product categories exist?"
    - "Find a product's composite item ID"
    - "Product dimension attributes lookup"

sql_context:
  columns:
    - { name: Composite_Item_ID, type: INT, description: "Product composite ID (join key for fact tables)" }
    - { name: EC_Group, type: STRING, description: "EC Group (205 distinct)" }
    - { name: Brand, type: STRING, description: "Brand name (458 distinct)" }
    - { name: Segment, type: STRING, description: "Product segment (12 distinct)" }
    - { name: Business_Segment, type: STRING, description: "Business segment (9 distinct)" }
    - { name: Technology, type: STRING, description: "Manufacturing technology (54 distinct)" }
    - { name: Product_Category, type: STRING, description: "Product category (75 distinct)" }
    - { name: Product_Consolidation, type: STRING, description: "Product consolidation grouping (23 distinct)" }
  id_encoding: >
    Composite_Item_ID encodes: EC_Group_ID#Tech_ID#Segment_ID#BizSeg_ID#Market_ID#Brand_ID#Format_ID#???#???
    Example: 106#200#501#1#23#442#17#35864#25099 = EC_Group=BAR, Brand=MARATHON, Segment=CHOCOLATE

