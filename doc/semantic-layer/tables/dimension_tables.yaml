# =============================================================================
# finiq_date — Fiscal Calendar
# =============================================================================

table_name: finiq_date
object_type: table
schema: finsight_core_model
risk_level: SAFE
row_count: 117

discovery:
  summary: >
    Mars fiscal calendar dimension. 117 periods from FY2020 to FY2028.
    Mars uses a 13-period fiscal year (not 12 months). Period 13 is a Q4
    adjustment period. Use for date lookups, quarter mapping, and fiscal
    year navigation.
  answers_questions:
    - "What fiscal period are we in?"
    - "Map a date to a fiscal quarter"
    - "What periods make up Q3?"
    - "List all available fiscal periods"

sql_context:
  columns:
    - { name: Date_ID, type: INT, description: "YYYYPP format (e.g., 202506)" }
    - { name: Year, type: INT, description: "Fiscal year" }
    - { name: Period, type: INT, description: "Fiscal period (1-13)" }
    - { name: Quarter, type: STRING, description: "Fiscal quarter (Q1-Q4)" }
  notes: "Mars fiscal calendar: 13 periods per year. Q4 has 4 periods (P10-P13), others have 3."

