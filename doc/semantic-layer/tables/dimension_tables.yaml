# =============================================================================
# DIMENSION TABLES — All safe to query without filters
# =============================================================================

# =============================================================================
# finiq_dim_unit — Organization Hierarchy
# =============================================================================

table_name: finiq_dim_unit
object_type: table
schema: finsight_core_model
risk_level: SAFE
row_count: 766

discovery:
  summary: >
    The organizational hierarchy for Mars, Incorporated. 766 units across 11 levels.
    Maps from Mars Inc (level 0) down through GBUs, divisions, regions, markets,
    to individual operational units. Use when you need to look up unit names, IDs,
    hierarchy levels, or navigate the org structure.
  answers_questions:
    - "What units are in the Pet Nutrition division?"
    - "Show the org hierarchy under Mars Wrigley"
    - "What level is MW USA in the hierarchy?"
    - "List all markets in a region"
    - "What is the Unit_ID for a specific unit?"
    - "Map between unit names and IDs"

sql_context:
  columns:
    - { name: Child_Unit_ID, type: INT, description: "Unit ID (join key for fact tables)" }
    - { name: Child_Unit, type: STRING, description: "Unit name (UPPERCASE)" }
    - { name: Unit_Level, type: INT, description: "Hierarchy level (0=Mars Inc, 1=GBU, etc.)" }
    - { name: Parent_Unit_ID, type: INT, description: "Parent unit ID" }
    - { name: Parent_Unit, type: STRING, description: "Parent unit name" }

  hierarchy_levels:
    0: "Mars Incorporated (3 nodes)"
    1: "GBU level (9 nodes)"
    2: "Division level (21 nodes)"
    3: "Sub-division (51 nodes)"
    4: "Region (118 nodes)"
    5: "Sub-region (144 nodes)"
    6: "Country/Market (203 nodes)"
    7: "Sub-market (124 nodes)"
    8: "Local unit (72 nodes)"
    9: "Operational (17 nodes)"
    10: "Lowest level (4 nodes)"

  safe_query_patterns:
    - description: "List all units at a specific level"
      sql: |
        SELECT Child_Unit_ID, Child_Unit, Unit_Level
        FROM finiq_dim_unit
        WHERE Unit_Level <= 3
        ORDER BY Unit_Level, Child_Unit

    - description: "Find children of a specific unit"
      sql: |
        SELECT Child_Unit_ID, Child_Unit, Unit_Level
        FROM finiq_dim_unit
        WHERE Parent_Unit = 'GBU PETCARE EX RUSSIA'
        ORDER BY Unit_Level

    - description: "Look up a unit ID by name"
      sql: |
        SELECT Child_Unit_ID, Child_Unit, Unit_Level
        FROM finiq_dim_unit
        WHERE Child_Unit LIKE '%USA%'

